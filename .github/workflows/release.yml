name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build macOS packages
        run: npm run dist:mac -- --x64 --arm64

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            releases/*.dmg
            releases/*.zip
          fail_on_unmatched_files: true

  windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows packages
        run: npm run dist:win

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            releases/*.exe
            releases/*.zip
          fail_on_unmatched_files: true
